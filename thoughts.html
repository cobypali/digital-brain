<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="/">
    <link rel="icon" href="favicons/favicon_v01.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Brain</title>
    <meta name="description" content="Digital Brain region page.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { display: flex; flex-direction: column; }
        #boot-loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0B1220;
            color: #E6EDF7;
            z-index: 300;
            font-size: 14px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        body[data-app-ready="true"] #boot-loading { display: none; }
        body[data-app-ready="false"] main,
        body[data-app-ready="false"] #brain-regions-nav {
            visibility: hidden;
        }
        main { flex: 1; padding: 120px 50px 80px; }
        .blog-section { max-width: 1400px; margin: 0 auto; }
        .page-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 18px; }
        .page-title { font-family: 'Inter', sans-serif; font-size: 48px; font-weight: 600; color: #E6EDF7; text-align: center; margin-bottom: 10px; }
        .page-subtitle { text-align: center; color: rgba(230, 237, 247, 0.7); }
        .page-title-wrap { flex: 1; }
        .item-count { text-align: right; font-size: 13px; color: rgba(230, 237, 247, 0.5); margin-bottom: 16px; }
        .page-status { min-height: 18px; margin-bottom: 14px; text-align: right; font-size: 12px; color: #93C5FD; }
        .session-toolbar, #editor-toolbar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 18px; }
        .toolbar-btn, .table-action {
            background: rgba(18, 26, 43, 0.85); border: 1px solid #1A2438; color: #E6EDF7; padding: 10px 14px; border-radius: 10px; font-size: 13px;
        }
        .toolbar-btn, .table-action { cursor: pointer; transition: background 0.2s; }
        .toolbar-btn:hover, .table-action:hover { background: rgba(59, 130, 246, 0.2); }
        .toolbar-btn.primary { background: #3B82F6; border-color: #3B82F6; }
        .toolbar-btn[disabled], .table-action[disabled] { opacity: 0.65; cursor: wait; }
        .table-action.delete { color: #FCA5A5; }
        .loading, .error { text-align: center; padding: 60px; color: #60A5FA; }
        .table-container { overflow-x: auto; border: 1px solid #1A2438; border-radius: 12px; background: rgba(18, 26, 43, 0.5); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead { background: rgba(26, 36, 56, 0.8); position: sticky; top: 0; }
        th { padding: 16px 20px; text-align: left; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #60A5FA; border-bottom: 1px solid #1A2438; cursor: pointer; white-space: nowrap; }
        th.sorted { color: #3B82F6; background: rgba(59, 130, 246, 0.1); }
        th .sort-arrow { margin-left: 6px; opacity: 0.5; font-size: 10px; }
        td { padding: 14px 20px; border-bottom: 1px solid rgba(26, 36, 56, 0.5); color: rgba(230, 237, 247, 0.9); }
        tr:hover td { background: rgba(59, 130, 246, 0.05); }
        .title-cell { color: #E6EDF7; font-weight: 500; cursor: pointer; }
        .row-num-header, .row-num { color: rgba(230, 237, 247, 0.4); text-align: center; width: 50px; }
        .row-num-header { cursor: default; }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(11, 18, 32, 0.95); backdrop-filter: blur(10px); z-index: 200;
            display: none; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #121A2B; border: 1px solid #1A2438; border-radius: 16px; max-width: 700px; width: 100%; padding: 40px; position: relative; margin: auto 0;
        }
        .modal-close {
            position: absolute; top: 20px; right: 20px; background: rgba(26, 36, 56, 0.8); border: 1px solid #1A2438; color: #E6EDF7;
            width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 20px;
        }
        .modal-title { font-size: 28px; font-weight: 600; color: #E6EDF7; margin-bottom: 16px; padding-right: 40px; }
        .modal-meta { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid #1A2438; }
        .modal-meta-item { display: flex; flex-direction: column; gap: 4px; }
        .modal-meta-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: rgba(230, 237, 247, 0.5); }
        .modal-meta-value { font-size: 16px; color: #E6EDF7; font-weight: 500; }
        .modal-review { font-size: 16px; line-height: 1.8; color: rgba(230, 237, 247, 0.9); white-space: pre-wrap; }
        #brain-regions-nav {
            position: fixed; top: 80px; right: 20px; background: #121A2B; backdrop-filter: blur(20px); padding: 20px; border-radius: 16px;
            color: #E6EDF7; border: 1px solid #1A2438; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); z-index: 50;
        }
        #brain-regions-nav h3 { margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: rgba(230, 237, 247, 0.5); }
        #brain-regions-nav ul { list-style: none; }
        #brain-regions-nav li a { padding: 8px 12px; border-radius: 8px; transition: background 0.2s; font-size: 14px; display: flex; align-items: center; gap: 10px; color: #E6EDF7; text-decoration: none; }
        #brain-regions-nav li a:hover, #brain-regions-nav li a.active { background: rgba(59, 130, 246, 0.2); }
        #brain-regions-nav .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        #brain-regions-nav .back-to-brain {
            display: block; text-align: center; background: #3B82F6; color: white; padding: 10px 16px; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600; margin-top: 14px;
        }
        .edit-form label { display: block; color: #E6EDF7; margin-bottom: 12px; font-size: 13px; }
        .edit-form input, .auth-grid input {
            width: 100%; margin-top: 6px; padding: 10px 12px; border-radius: 8px; border: 1px solid #1A2438; background: rgba(11, 18, 32, 0.9); color: #E6EDF7;
        }
        .auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .auth-grid form { display: grid; gap: 10px; }
        #auth-message { min-height: 18px; color: #93C5FD; margin-top: 10px; }
        @media (max-width: 768px) {
            main { padding: 100px 15px 60px; }
            .page-header-row, .session-toolbar, #editor-toolbar, .auth-grid { display: block; }
            .page-title { font-size: 24px; margin-bottom: 12px; }
            .page-subtitle { font-size: 14px; }
            #brain-regions-nav {
                display: block;
                top: auto;
                right: 10px;
                left: 10px;
                bottom: 10px;
                padding: 14px;
                max-height: 150px;
                overflow-y: auto;
            }
            #brain-regions-nav ul {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            #brain-regions-nav li a { font-size: 13px; padding: 8px 10px; }
            #brain-regions-nav .back-to-brain { margin-top: 10px; }
            main { padding-bottom: 210px; }
            .modal { padding: 24px; }
        }
    </style>
</head>
<body data-app-ready="false">
    <nav>
        <a href="/" class="logo">DIGITAL BRAIN</a>
    </nav>
    <div id="boot-loading">Loading brain...</div>
    <div id="brain-regions-nav">
        <h3>Brain Regions</h3>
        <ul id="region-links"></ul>
        <a href="/" class="back-to-brain" id="back-to-brain-link">Back to Digital Brain</a>
    </div>
    <main>
        <div class="blog-section">
            <div class="page-header-row">
                <div class="page-title-wrap">
                    <h1 class="page-title" id="page-title">Digital Brain</h1>
                    <p class="page-subtitle" id="page-subtitle"></p>
                </div>
            </div>
            <div class="session-toolbar">
                <button class="toolbar-btn" id="edit-toggle-btn" type="button">Edit Sheet</button>
            </div>
            <div id="editor-toolbar" style="display:none;">
                <button class="toolbar-btn primary" id="add-row-btn" type="button">Add Row</button>
            </div>
            <p class="page-status" id="page-status"></p>
            <p class="item-count" id="item-count"></p>
            <div id="content"><div class="loading"><p>Loading sheet...</p></div></div>
        </div>
    </main>

    <div class="modal-overlay" id="detail-modal-overlay">
        <div class="modal">
            <button class="modal-close" id="modal-close">&times;</button>
            <h2 class="modal-title" id="modal-title"></h2>
            <div class="modal-meta" id="modal-meta"></div>
            <div class="modal-review" id="modal-review"></div>
        </div>
    </div>
    <div class="modal-overlay" id="edit-row-modal-overlay">
        <div class="modal">
            <button class="modal-close" onclick="closeEditor()">&times;</button>
            <h2 class="modal-title">Edit Row</h2>
            <form class="edit-form" id="edit-row-form">
                <div id="edit-fields"></div>
                <button class="toolbar-btn primary" type="submit">Save Changes</button>
            </form>
        </div>
    </div>
    <div class="modal-overlay" id="auth-modal-overlay">
        <div class="modal">
            <button class="modal-close" id="auth-close">&times;</button>
            <h2 class="modal-title">Sign in to edit your brain</h2>
            <div class="auth-grid">
                <form id="signup-form">
                    <input type="text" id="signup-username" placeholder="Create username" required>
                    <input type="email" id="signup-email" placeholder="Email address" required>
                    <input type="password" id="signup-password" placeholder="Create password" required>
                    <button class="toolbar-btn primary" type="submit">Create Brain</button>
                </form>
                <form id="login-form">
                    <input type="text" id="login-identifier" placeholder="Username or email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button class="toolbar-btn" type="submit">Sign In</button>
                </form>
            </div>
            <p id="auth-message"></p>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script src="config.js"></script>
    <script type="module" src="region-page.js"></script>
</body>
</html>
